<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنت غير متصل | مشاوريري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root {
            --primary: #10B981;
            --bg: #F8FAFC;
            --text: #1E293B;
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .offline-container {
            max-width: 400px;
            padding: 2rem;
            background: var(--card-bg);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: fadeIn 0.8s ease;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 3rem;
            animation: pulse 2s infinite;
        }

        h1 {
            margin: 0 0 1rem;
            font-weight: 900;
            font-size: 1.5rem;
        }

        p {
            line-height: 1.6;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 1rem;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(16, 185, 129, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="icon-circle">
            <i class='bx bx-wifi-off'></i>
        </div>
        <h1>أنت غير متصل حالياً</h1>
        <p>يبدو أنك لا تملك اتصالاً بالإنترنت الآن. لا تقلق، يمكنك الاستمرار في استخدام التطبيق والوصول لبياناتك المحلية المحفوظة.</p>
        <button class="btn" onclick="window.location.reload()">تحديث الصفحة</button>
    </div>
</body>
</html>
